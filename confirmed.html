<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bioloom. — Email Confirmed</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', -apple-system, sans-serif;
    background: #040d1a;
    color: #c8dce8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    max-width: 420px;
    text-align: center;
  }
  .logo { font-size: 48px; margin-bottom: 16px; filter: drop-shadow(0 0 12px #00e5ff66); }
  h1 { font-size: 24px; font-weight: 600; color: #e8f4fc; margin-bottom: 8px; }
  .brand { color: #00e5ff; }
  p { font-size: 15px; line-height: 1.6; margin-bottom: 20px; color: #5a7a94; }
  .success-msg {
    background: #0a1628;
    border: 1px solid #00e5ff33;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .success-msg p { color: #c8dce8; margin-bottom: 0; }
  .checkmark { font-size: 40px; color: #00e5ff; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">◉</div>
  <h1><span class="brand">bioloom.</span></h1>
  <div class="success-msg">
    <div class="checkmark">✓</div>
    <p>Your email has been confirmed. You can now close this page and log in to the app.</p>
  </div>
  <p>Open bioloom. on your phone and sign in with your email and password.</p>
</div>
</body>
</html>
